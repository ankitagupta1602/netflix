<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="">
    <div class="relative h-screen w-screen">
      <div class="absolute inset-0 bg-black/75"></div>
    
    <img src="https://cdn.wallpapersafari.com/24/74/zgeTuV.jpg"
         class="w-full h-full object-cover">
         
    
    <div>
     <div class="absolute top-5 left-10 z-10 ">
      <span class="text-red-600 font-bold text-5xl tracking-wide">NETFLIX</span>
    </div>
    <div class="absolute top-5 right-10 z-10">
      <select class="text-white py-1 px-5 border-2 border-gray-400 font-bold rounded">
        <option>English</option>
        <option>Hindi</option>
      </select>
      <button class="bg-red-600 text-white font-bold px-3 py-1 ml-5 mr-15 rounded">Sign In</button>
    </div>
    </div>
    <main>
      <div class="absolute inset-0 flex flex-col items-center mt-40 justify-center z-10 text-white">
        <h1 class="text-5xl font-bold">Unlimited movies, shows,</h1>
        <h1 class="font-bold text-5xl">and more</h1>
        <p class=" leading-16 text-xl">Starts at 149. Cancel at anytime</p>
        <p class="text-xl text-center">Ready to watch? Enter your email to create or restart your<br> membership.</p><br>
        <div>
       <input type="email" placeholder="Email address"  class="w-80 h-18 px-4 bg-black/50 border border-gray-500 rounded text-white placeholder:text-lg placeholder:font-bold placeholder:text-gray-400 focus:outline-none focus:border-white -ml-10">
       <button class="font-bold text-xl text-white py-5 px-15 rounded bg-red-600">Get Started ❯</button>
       </div>
      </div>
    </main>
   

</div>
  </body>
